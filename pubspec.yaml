name: taskremind_pro
description: Offline daily task reminder app with overlay popup.
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_overlay_window: ^0.5.0
  flutter_local_notifications: ^20.1.0
  workmanager: ^0.9.0+3
  permission_handler: ^12.0.1
  flutter_riverpod: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
