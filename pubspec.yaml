name: taskremind_pro
description: Offline Android reminder app with full-screen overlays.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2
  isar: 3.1.0+1
  isar_flutter_libs: 3.1.0+1
  flutter_local_notifications: ^20.1.0
  timezone: ^0.9.4
  flutter_overlay_window: ^0.5.0
  workmanager: ^0.9.0+3
  permission_handler: ^12.0.1
  package_info_plus: ^8.0.2
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.6
  riverpod_generator: ^2.6.3
  isar_generator: 3.1.0+1

flutter:
  uses-material-design: true
